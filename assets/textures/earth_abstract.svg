    <path fill="#74865b" d="M309 68l72-22 70 18 24 26-21 20-58 2-25 22-37-16-18-20z"/>
    <path fill="#b18a51" d="M393 163l31-17 39 13 16 25-23 23-44-7-22-22z"/>
