    <path d="M132 117l33-9 28 18 15 43-13 50-22 27-18-34 4-30-18-21z"/>
    <path d="M211 48l24-24 35 7 5 25-27 16-28-6z"/>
    <path d="M226 69l34-25 43 2 22 18 63-25 76 18 24 34-28 28-66 3-23 23-38-14-23 16-9 58-29 21-27-39 4-39-26-21z"/>
    <path d="M386 157l36-20 48 15 20 34-29 31-54-8-27-29z"/>
  </g>

